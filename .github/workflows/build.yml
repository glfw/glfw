name: Build and Deploy
on:
  pull_request:
  push:
    branches: [ ci, master, latest, 3.3-stable, main ]
  workflow_dispatch:

permissions:
  statuses: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. SETUP PYTHON (For your Django Backend)
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          uv sync
          uv pip install django pillow asgiref sqlparse
        env:
          UV_LINK_MODE: copy

      # 2. SETUP NODE & ANGULAR (This fixes the "ng: command not found" error)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Angular CLI
        run: npm install -g @angular/cli

      - name: Install Project Dependencies
        run: npm install

      - name: Build Angular Project
        run: ng build --configuration production
