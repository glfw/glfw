name: Build and Deploy
on:
  push:
    # This covers almost any branch name you might be using
    branches: [ main, master, latest, ci, 3.3-stable ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # This allows you to start the build manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # FIX: This installs the missing "ng" command
      - name: Install Angular CLI
        run: npm install -g @angular/cli

      - name: Install Project Dependencies
        run: npm install

      # FIX: This runs the actual build
      - name: Build Project
        run: ng build --configuration production
